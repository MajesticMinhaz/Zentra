x-django-base: &django-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      PYTHON_VERSION: "3.13"
      UV_VERSION: "0.6.6"
  image: zentra-backend:latest
  restart: unless-stopped
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-zentra}
      POSTGRES_USER: ${DB_USER:-zentra}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zentra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zentra} -d ${DB_NAME:-zentra}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - backend

  migrate:
    <<: *django-base
    restart: "no"
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput
      "
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    networks:
      - backend

  web:
    <<: *django-base
    expose:
      - "8000"
    command: >
      gunicorn zentra.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --access-logfile -
      --error-logfile -
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    networks:
      - backend
      - frontend

  celery_worker:
    <<: *django-base
    command: >
      celery -A zentra.celery worker
      --loglevel=info
      --queues=default,invoices,subscriptions
      --concurrency=2
      --pool=prefork
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - media_data:/app/media
    networks:
      - backend

  celery_beat:
    <<: *django-base
    command: >
      celery -A zentra.celery beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        NODE_VERSION: "22"
    image: zentra-nginx:latest
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    ports:
      - "${NGINX_PORT_EXPOSED:-8080}:80"
    volumes:
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - frontend
      - backend

  pgadmin:
    image: dpage/pgadmin4:9.13.0
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@zentra.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGPASS_FILE: /pgpass
    ports:
      - "127.0.0.1:${PGADMIN_PORT_EXPOSED:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  pgadmin_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
